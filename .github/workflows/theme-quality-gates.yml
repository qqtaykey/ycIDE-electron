name: Theme Quality Gates

on:
  pull_request:
  release:
    types: [prereleased]

jobs:
  pr-theme-gate-blocking:
    name: PR Blocking Theme Gate (contract-first -> UI)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Enforce quarantine policy
        run: node scripts/theme/check-quarantine-overdue.mjs
      - name: Run fast gate
        run: npm run test:theme:gate

  prerelease-theme-full:
    name: Pre-release Full Theme Regression (contract + UI)
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Enforce quarantine policy
        run: node scripts/theme/check-quarantine-overdue.mjs
      - name: Run full theme regression
        run: npm run test:theme:full
